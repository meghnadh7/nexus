name: RAG Reindex

on:
  workflow_dispatch:
    inputs:
      repo_path:
        description: "Path within the repo to index (default: entire repo)"
        required: false
        default: "."

jobs:
  reindex:
    name: Reindex codebase into Pinecone
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run RAG indexer
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e OPENAI_EMBEDDING_MODEL=text-embedding-3-large \
            -e PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }} \
            -e PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }} \
            -e REPO_PATH=/repo \
            -e ENV=production \
            -e LOG_LEVEL=INFO \
            -v ${{ github.workspace }}:/repo:ro \
            ghcr.io/${{ github.repository_owner }}/nexus-rag-indexer:latest \
            python -m rag_indexer.main --repo-path /repo/${{ inputs.repo_path || '.' }}
