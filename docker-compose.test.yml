version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexus_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-runner:
    build:
      context: ./services/orchestrator
      target: production
    environment:
      POSTGRES_URL: postgresql+asyncpg://nexus:password@postgres-test:5432/nexus_test
      REDIS_URL: redis://redis-test:6379/0
      OPENAI_API_KEY: test-key
      PINECONE_API_KEY: test-key
      PINECONE_INDEX_NAME: test-index
      GITHUB_TOKEN: test-token
      GITHUB_WEBHOOK_SECRET: test-secret
      GITHUB_ORG: test-org
      GITHUB_REPO: test-repo
      SLACK_BOT_TOKEN: test-token
      SLACK_SIGNING_SECRET: test-secret
      SLACK_DEFAULT_CHANNEL: "#test"
      JIRA_BASE_URL: http://localhost
      JIRA_EMAIL: test@test.com
      JIRA_API_TOKEN: test-token
      JIRA_PROJECT_KEY: TEST
      DATADOG_API_KEY: test-key
      DATADOG_APP_KEY: test-key
      MCP_GITHUB_URL: http://localhost:8001
      MCP_SLACK_URL: http://localhost:8002
      MCP_JIRA_URL: http://localhost:8003
      MCP_DATADOG_URL: http://localhost:8004
      HUMAN_IN_THE_LOOP: "false"
      ENV: development
      LOG_LEVEL: DEBUG
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: ["pytest", "tests/", "-v", "--tb=short"]
