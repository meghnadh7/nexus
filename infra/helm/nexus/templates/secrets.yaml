# This Secret is intentionally empty — values are injected by CI/CD (via
# helm --set-string or --values from a sealed-secrets / external-secrets
# operator) or mounted by the cluster's secret management solution.
#
# In production, use external-secrets-operator with AWS Secrets Manager,
# HashiCorp Vault, or GCP Secret Manager so secrets never live in git.
apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
  annotations:
    # Signal to external-secrets-operator if used
    nexus.io/managed-by: helm
type: Opaque
data:
  # All values must be base64-encoded and are injected at deploy time.
  # The keys listed here document the expected secret surface area.
  #
  # OpenAI
  OPENAI_API_KEY: ""
  OPENAI_MODEL: ""
  OPENAI_EMBEDDING_MODEL: ""
  # LangSmith
  LANGCHAIN_API_KEY: ""
  LANGCHAIN_PROJECT: ""
  LANGCHAIN_TRACING_V2: ""
  LANGCHAIN_ENDPOINT: ""
  # Pinecone
  PINECONE_API_KEY: ""
  PINECONE_INDEX_NAME: ""
  # GitHub
  GITHUB_TOKEN: ""
  GITHUB_WEBHOOK_SECRET: ""
  GITHUB_ORG: ""
  GITHUB_REPO: ""
  # Slack
  SLACK_BOT_TOKEN: ""
  SLACK_SIGNING_SECRET: ""
  SLACK_DEFAULT_CHANNEL: ""
  # Jira
  JIRA_BASE_URL: ""
  JIRA_EMAIL: ""
  JIRA_API_TOKEN: ""
  JIRA_PROJECT_KEY: ""
  # Datadog
  DATADOG_API_KEY: ""
  DATADOG_APP_KEY: ""
  # Databases
  POSTGRES_URL: ""
  POSTGRES_USER: ""
  POSTGRES_PASSWORD: ""
  REDIS_URL: ""
  # MCP URLs
  MCP_GITHUB_URL: ""
  MCP_SLACK_URL: ""
  MCP_JIRA_URL: ""
  MCP_DATADOG_URL: ""
  # Behaviour
  HUMAN_IN_THE_LOOP: ""
  MAX_AGENT_ITERATIONS: ""
  LOG_LEVEL: ""
  ENV: ""
