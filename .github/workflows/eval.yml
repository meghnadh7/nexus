name: LangSmith Evaluations

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "evals/**"
      - "services/orchestrator/src/orchestrator/agents/**"

jobs:
  eval:
    name: Run LangSmith Evals
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install eval dependencies
        run: |
          pip install langsmith openai pinecone-client structlog
          pip install -e services/orchestrator ".[dev]"
          pip install -e services/rag-indexer

      - name: Run evaluations
        id: eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT: nexus-evals
          LANGCHAIN_TRACING_V2: "true"
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_WEBHOOK_SECRET: eval-secret
          GITHUB_ORG: eval-org
          GITHUB_REPO: eval-repo
          SLACK_BOT_TOKEN: xoxb-eval
          SLACK_SIGNING_SECRET: eval-secret
          JIRA_BASE_URL: http://localhost
          JIRA_EMAIL: eval@eval.com
          JIRA_API_TOKEN: eval-token
          DATADOG_API_KEY: eval-key
          DATADOG_APP_KEY: eval-key
          ENV: development
        run: |
          python evals/run_evals.py --output-file eval_results.json 2>&1 | tee eval_output.txt
          echo "EVAL_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          cat eval_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = 'Eval output not available';
            try {
              results = fs.readFileSync('eval_output.txt', 'utf8');
            } catch(e) {}
            const body = `## 🧪 LangSmith Evaluation Results\n\`\`\`\n${results.slice(0, 4000)}\n\`\`\`\n\n[View full results in LangSmith](https://smith.langchain.com/projects/nexus-evals)`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: eval_results.json
          retention-days: 30
