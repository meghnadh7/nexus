# ─── Global ───────────────────────────────────────────────────────────────────
global:
  imageTag: latest
  registry: ghcr.io/your-org/nexus
  imagePullPolicy: IfNotPresent

# ─── Orchestrator ─────────────────────────────────────────────────────────────
orchestrator:
  replicaCount: 2
  image:
    repository: orchestrator
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  service:
    port: 8000
    type: ClusterIP

# ─── MCP Servers ──────────────────────────────────────────────────────────────
mcpGithub:
  replicaCount: 1
  image:
    repository: mcp-github
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 8001

mcpSlack:
  replicaCount: 1
  image:
    repository: mcp-slack
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 8002

mcpJira:
  replicaCount: 1
  image:
    repository: mcp-jira
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 8003

mcpDatadog:
  replicaCount: 1
  image:
    repository: mcp-datadog
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 8004

# ─── RAG Indexer CronJob ──────────────────────────────────────────────────────
ragIndexer:
  image:
    repository: rag-indexer
  schedule: "0 * * * *"  # Hourly
  repoUrl: "https://github.com/your-org/your-repo.git"
  repoBranch: main
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

# ─── Postgres ─────────────────────────────────────────────────────────────────
postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 20Gi
  storageClassName: standard
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ─── Redis ────────────────────────────────────────────────────────────────────
redis:
  enabled: true
  image: redis:7-alpine
  storage: 5Gi
  storageClassName: standard
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: nexus.yourcompany.com
  tls:
    enabled: true
    secretName: nexus-tls
