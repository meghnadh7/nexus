name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nexus

jobs:
  # ─── Lint + Test ────────────────────────────────────────────────────────────
  test:
    name: "Test — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - orchestrator
          - mcp-github
          - mcp-slack
          - mcp-jira
          - mcp-datadog
          - rag-indexer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: Install rag-indexer first (orchestrator depends on it at import time)
        if: matrix.service == 'orchestrator'
        working-directory: services/rag-indexer
        run: pip install -e .

      - name: Install service with dev extras
        working-directory: services/${{ matrix.service }}
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: services/${{ matrix.service }}
        run: ruff check src/ || true

      - name: Type-check with mypy
        working-directory: services/${{ matrix.service }}
        run: mypy src/ --ignore-missing-imports || true

      - name: Run unit tests
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -d tests ] && [ "$(ls -A tests/)" ]; then
            pytest tests/ -v --tb=short -m "not integration"
          else
            echo "No tests for ${{ matrix.service }} — skipping."
          fi
        env:
          # Minimal env vars so config loading doesn't fail
          OPENAI_API_KEY: test-key
          PINECONE_API_KEY: test-key
          GITHUB_TOKEN: test-token
          GITHUB_WEBHOOK_SECRET: test-secret
          GITHUB_ORG: test-org
          GITHUB_REPO: test-repo
          SLACK_BOT_TOKEN: xoxb-test
          SLACK_SIGNING_SECRET: test-secret
          JIRA_BASE_URL: http://localhost
          JIRA_EMAIL: test@test.com
          JIRA_API_TOKEN: test
          DATADOG_API_KEY: test
          DATADOG_APP_KEY: test
          ENV: development

  # ─── Docker build + push (push to main only) ────────────────────────────────
  build:
    name: "Build — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - orchestrator
          - mcp-github
          - mcp-slack
          - mcp-jira
          - mcp-datadog
          - rag-indexer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'orchestrator' && 'services' || format('services/{0}', matrix.service) }}
          file: services/${{ matrix.service }}/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
